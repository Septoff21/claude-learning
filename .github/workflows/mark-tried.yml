name: Mark as Tried

on:
  workflow_dispatch:
    inputs:
      note_slug:
        description: 'Note filename without .md (e.g. npow__claude-skills)'
        required: true
      rating:
        description: 'Personal rating 1-5'
        required: false
        default: '3'
      comment:
        description: 'Short comment about your experience'
        required: false

permissions:
  contents: write

jobs:
  mark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mark note as tried
        env:
          NOTE_SLUG: ${{ inputs.note_slug }}
          RATING: ${{ inputs.rating }}
          COMMENT: ${{ inputs.comment }}
        run: python3 scripts/mark_tried.py

      - name: Commit
        run: |
          git config user.name "claude-digest-bot"
          git config user.email "claude-digest-bot@users.noreply.github.com"
          git add notes/
          git diff --staged --quiet || git commit -m "tried: ${{ inputs.note_slug }}"
          git push
