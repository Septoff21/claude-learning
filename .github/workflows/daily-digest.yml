name: Daily Claude Digest

on:
  schedule:
    - cron: '0 13 * * 1-5'   # 9pm SGT (UTC+8), weekdays
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run daily digest (Anthropic + HN + Reddit + YouTube + GitHub)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/daily_digest.py

      - name: Auto-ingest quality >= 4 repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/auto_ingest.py

      - name: Commit and push
        run: |
          git config user.name "claude-digest-bot"
          git config user.email "claude-digest-bot@users.noreply.github.com"
          git add inbox/ notes/ moc/ originals/ || true
          git diff --staged --quiet || git commit -m "daily: $(date -u +%Y-%m-%d)"
          git push
