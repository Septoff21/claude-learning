name: Telegram Inbox

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Poll Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OWNER_ID: ${{ secrets.TELEGRAM_OWNER_ID }}
        run: python3 scripts/telegram_inbox.py

      - name: Commit if new URLs
        run: |
          git config user.name "claude-digest-bot"
          git config user.email "claude-digest-bot@users.noreply.github.com"
          git add inbox/urls.md inbox/.tg_offset
          git diff --staged --quiet || git commit -m "inbox: new URLs from Telegram"
          git push
